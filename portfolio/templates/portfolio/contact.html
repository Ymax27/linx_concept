{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="max-w-2xl mx-auto px-6 py-20">
    <div class="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden shadow-2xl">

        <div class="bg-slate-800 px-4 py-2 flex gap-2">
            <div class="w-3 h-3 rounded-full bg-red-500"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div class="w-3 h-3 rounded-full bg-green-500"></div>
            <span class="ml-4 font-mono text-xs text-slate-400">contact_me.py</span>
        </div>

        <form method="POST" class="p-8 space-y-6 font-mono">
            {% csrf_token %}
            {% if messages %}
                {% for message in messages %}
                    <div class="bg-blue-500/20 border border-blue-500 text-blue-400 p-4 mb-6 text-sm">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <div class="space-y-2">
                <label class="text-blue-500 text-xs uppercase tracking-widest">> NOM </label>
                <input type="text" name="name" required class="w-full bg-slate-950 border-b border-slate-700 p-2 focus:border-blue-500 outline-none transition">
            </div>

            <div class="space-y-2">
                <label class="text-blue-500 text-xs uppercase tracking-widest">> EMAIL </label>
                <input type="email" name="email" required class="w-full bg-slate-950 border-b border-slate-700 p-2 focus:border-blue-500 outline-none transition">
            </div>

            <div class="space-y-2">
                <label class="text-blue-500 text-xs uppercase tracking-widest">> OBJET</label>
                <input type="text" name="subject" required class="w-full bg-slate-950 border-b border-slate-700 p-2 focus:border-blue-500 outline-none transition">
            </div>

            <div class="space-y-2">
                <label class="text-blue-500 text-xs uppercase tracking-widest">> MESSAGE_CONTENU </label>
                <textarea name="message" rows="4" required class="w-full bg-slate-950 border-b border-slate-700 p-2 focus:border-blue-500 outline-none transition"></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 font-bold uppercase tracking-widest transition transform hover:scale-[1.02]">
                EXÉCUTER L'ENVOI
            </button>
        </form>
    </div>
</section>
{% endblock %}
